name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Audit
        run: pnpm audit --audit-level=low

      - name: Pack Check
        run: pnpm pack --dry-run
