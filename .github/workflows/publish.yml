name: Publish to npm

on:
  release:
    types:
      - published

permissions: {}

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Verified Release
    if: github.event.release.prerelease == false
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write # Request npm's short-lived OIDC credential.
    steps:
      - name: Checkout Release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set Up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.15.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set Up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Validate Release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Audit
        run: pnpm audit --audit-level=low

      - name: Inspect Package
        run: pnpm pack --dry-run

      - name: Publish
        run: npm publish --access public
