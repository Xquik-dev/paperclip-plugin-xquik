name: Publish to npm

on:
  release:
    types:
      - published

permissions: {}

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Verified Release
    if: github.event.release.prerelease == false
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write # Request npm's short-lived OIDC credential.
    steps:
      - name: Checkout Release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set Up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.15.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set Up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Validate Release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Audit
        run: pnpm audit --audit-level=low

      - name: Inspect Package
        run: pnpm pack --dry-run

      - name: Publish
        run: npm publish --access public
